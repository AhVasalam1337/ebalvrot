<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Geminка ИИ</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        geminiBg: '#131314',
                        geminiInput: '#1e1f20',
                        geminiBotMsg: '#1e1f20',
                        geminiUserMsg: '#282a2c',
                        geminiAccent: '#8ab4f8'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-geminiBg overflow-hidden">

<div class="app-container flex flex-col h-screen h-[100dvh]">
    <div id="sidebar" class="fixed inset-y-0 left-0 w-[300px] bg-[#1e1f20] z-[100] transform -translate-x-full transition-transform duration-300 ease-in-out border-r border-gray-800 shadow-2xl flex flex-col">
        <div class="p-6 border-b border-gray-800 flex items-center justify-between pt-[max(1.5rem,env(safe-area-inset-top))]">
            <h2 id="menuTitle" class="text-xl font-bold text-geminiAccent">Меню</h2>
            <button id="backBtn" class="hidden text-gray-400 hover:text-white"><span class="material-icons-outlined">arrow_back</span></button>
        </div>
        <nav id="menuContent" class="flex-1 p-4 space-y-2 overflow-y-auto"></nav>
        <div class="p-4 border-t border-gray-800 text-[10px] text-gray-500 text-center uppercase pb-[max(1rem,env(safe-area-inset-bottom))]">Geminка v1.2</div>
    </div>

    <div id="modalOverlay" class="fixed inset-0 bg-black/80 z-[110] hidden flex items-center justify-center p-4">
        <div class="bg-geminiInput w-full max-w-sm rounded-2xl border border-gray-700 p-6 shadow-2xl">
            <h3 id="modalTitle" class="text-lg font-bold text-white mb-4">Настройка</h3>
            <div id="modalBody"></div>
            <div class="flex justify-end gap-3 mt-6">
                <button id="modalCancel" class="px-4 py-2 text-gray-400 font-medium">Отмена</button>
                <button id="modalSave" class="px-5 py-2 bg-geminiAccent text-black rounded-xl font-bold">Сохранить</button>
            </div>
        </div>
    </div>

    <div id="overlay" class="fixed inset-0 bg-black/60 z-[90] hidden opacity-0 transition-opacity duration-300"></div>

    <header class="flex items-center justify-between px-3 border-b border-gray-800 bg-geminiBg shrink-0 pt-[env(safe-area-inset-top)] h-[calc(60px+env(safe-area-inset-top))] relative z-50">
        <button id="menuBtn" class="w-10 h-10 flex items-center justify-center text-gray-400 active:bg-gray-800 rounded-full flex-shrink-0">
            <span class="material-icons-outlined">menu</span>
        </button>
        <div class="absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2 mt-[calc(env(safe-area-inset-top)/2)]">
            <h1 id="chatNameDisplay" class="text-xl font-medium text-white tracking-tight">Geminка</h1>
        </div>
        <button class="w-10 h-10 flex items-center justify-center text-gray-400 active:bg-gray-800 rounded-full" onclick="location.reload()">
            <span class="material-icons-outlined">refresh</span>
        </button>
    </header>

    <main id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-6 flex flex-col"></main>

    <footer class="p-3 pb-[max(0.75rem,env(safe-area-inset-bottom))] bg-geminiBg border-t border-gray-800">
        <div class="max-w-4xl mx-auto flex items-center gap-2 bg-geminiInput border border-gray-700 rounded-[24px] px-3 py-1 shadow-2xl min-h-[48px]">
            <button class="text-gray-400 w-8 h-8 flex items-center justify-center"><span class="material-icons-outlined">add</span></button>
            <textarea id="userInput" rows="1" placeholder="Введите запрос..." class="flex-1 bg-transparent text-[16px] text-white py-2.5 focus:outline-none resize-none overflow-y-hidden max-h-[150px] leading-snug"></textarea>
            <button id="sendBtn" class="text-geminiAccent disabled:text-gray-600 w-8 h-8 flex items-center justify-center" disabled><span class="material-icons-outlined">send</span></button>
        </div>
    </footer>
</div>

<script src="/script.js"></script>
</body>
</html>
