<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Катя ИИ</title>
    <link rel="manifest" href="/manifest.json">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        geminiBg: '#131314',
                        geminiInput: '#1e1f20',
                        geminiBotMsg: '#1e1f20',
                        geminiUserMsg: '#282a2c',
                        geminiAccent: '#8ab4f8'
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #131314;
            color: #e3e3e3;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            margin: 0;
        }
        
        #chat-messages::-webkit-scrollbar { width: 0; }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .msg-anim { animation: fadeIn 0.3s ease-out forwards; }
        
        #chat-messages { 
            scroll-behavior: smooth; 
            -webkit-overflow-scrolling: touch;
        }

        /* Чтобы текст не слипался и переносился как в мессенджерах */
        .message-text {
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.5;
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="flex items-center justify-between px-4 py-3 border-b border-gray-800 bg-geminiBg/80 backdrop-blur-md sticky top-0 z-50 h-[60px] shrink-0">
        <div class="flex items-center gap-2">
            <span class="material-icons-outlined text-gray-400 cursor-pointer">menu</span>
            <h1 class="text-xl font-medium">Катя</h1>
            <span class="material-icons-outlined text-geminiAccent text-sm">arrow_drop_down</span>
        </div>
        <div class="flex items-center gap-4">
            <span class="material-icons-outlined text-gray-400 cursor-pointer" onclick="location.reload()">refresh</span>
            <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center font-bold text-sm shadow-lg">P</div>
        </div>
    </header>

    <main id="chat-messages" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 pb-10">
        <div id="initial-loader" class="flex justify-center items-center h-full">
            <div class="w-6 h-6 border-2 border-geminiAccent border-t-transparent rounded-full animate-spin"></div>
        </div>
    </main>

    <footer class="p-3 pb-6 bg-geminiBg shrink-0">
        <div class="max-w-4xl mx-auto flex items-center gap-2 bg-geminiInput border border-gray-700 rounded-full px-2 py-1 shadow-2xl min-h-[56px]">
            
            <button class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-white rounded-full transition-colors">
                <span class="material-icons-outlined">add</span>
            </button>
            
            <input id="userInput" type="text" placeholder="Введите запрос..." 
                   class="flex-1 bg-transparent text-[16px] text-white px-2 placeholder:text-gray-500 focus:outline-none focus:ring-0">
            
            <button id="sendBtn" class="w-10 h-10 flex items-center justify-center text-geminiAccent disabled:text-gray-600 rounded-full transition-all" disabled>
                <span class="material-icons-outlined">send</span>
            </button>
            
        </div>
    </footer>

    <script>
        const msgDiv = document.getElementById('chat-messages');
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');
        const loader = document.getElementById('initial-loader');
        
        // Идентификатор сессии (pwa_ чтобы не путать с tg_)
        let myId = localStorage.getItem('pwa_chat_id') || 'pwa_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('pwa_chat_id', myId);

        // 1. ПОДГРУЗКА ИСТОРИИ ПРИ СТАРТЕ
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch(`/api/history?chatId=${myId}`);
                const data = await res.json();
                
                msgDiv.innerHTML = ''; // Убираем крутилку
                
                if (data.history && data.history.length > 0) {
                    data.history.forEach(msg => {
                        const role = msg.role === 'user' ? 'user' : 'bot';
                        const text = msg.parts[0].text;
                        renderMessage(text, role, false);
                    });
                    scrollToBottom('auto');
                } else {
                    renderMessage("Привет! Я Катя. Как твои дела?", 'bot', true);
                }
            } catch (e) {
                msgDiv.innerHTML = '<div class="text-center text-gray-500 py-10">Не удалось загрузить историю...</div>';
            }
        });

        // 2. ОТПРАВКА СООБЩЕНИЯ
        input.addEventListener('input', () => { btn.disabled = !input.value.trim(); });

        async function send() {
            const text = input.value.trim();
            if(!text) return;
            
            renderMessage(text, 'user', true);
            input.value = '';
            btn.disabled = true;

            const loadingId = showLoading();

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ text, chatId: myId })
                });
                
                const data = await res.json();
                hideLoading(loadingId);
                
                if(data.text) {
                    renderMessage(data.text, 'bot', true);
                } else {
                    throw new Error();
                }
            } catch (e) {
                hideLoading(loadingId);
                renderMessage('Ошибка связи. Катя не отвечает.', 'bot', true, 'bg-red-900/30 border border-red-800');
            }
        }

        // 3. РЕНДЕР БАББЛОВ
        function renderMessage(text, role, animate = true, extraClass = '') {
            const container = document.createElement('div');
            container.className = `flex gap-3 items-start ${animate ? 'msg-anim' : ''} ${role === 'user' ? 'flex-row-reverse' : ''}`;
            
            const avatar = role === 'bot' 
                ? '<div class="w-9 h-9 rounded-full bg-gray-800 flex items-center justify-center text-geminiAccent mt-1 shrink-0 shadow-sm">✨</div>' 
                : '<div class="w-9 h-9 rounded-full bg-blue-700 flex items-center justify-center text-white mt-1 shrink-0 shadow-sm text-xs font-bold">P</div>';

            const bubbleBg = role === 'bot' 
                ? `bg-geminiBotMsg rounded-2xl rounded-tl-none ${extraClass}` 
                : `bg-geminiUserMsg rounded-2xl rounded-tr-none`;

            container.innerHTML = `
                ${avatar}
                <div class="${bubbleBg} p-4 max-w-[85%] shadow-sm">
                    <div class="message-text text-[15px]">${text}</div>
                </div>
            `;
            
            msgDiv.appendChild(container);
            if(animate) scrollToBottom('smooth');
        }

        // 4. ИНДИКАТОР ЗАГРУЗКИ
        function showLoading() {
            const id = 'l_' + Date.now();
            const container = document.createElement('div');
            container.id = id;
            container.className = 'flex gap-3 items-start msg-anim';
            container.innerHTML = `
                <div class="w-9 h-9 rounded-full bg-gray-800 flex items-center justify-center text-geminiAccent mt-1 shrink-0">✨</div>
                <div class="bg-geminiBotMsg p-4 rounded-2xl rounded-tl-none flex gap-1 items-center">
                    <div class="w-1.5 h-1.5 bg-gray-500 rounded-full animate-bounce [animation-delay:-0.3s]"></div>
                    <div class="w-1.5 h-1.5 bg-gray-500 rounded-full animate-bounce [animation-delay:-0.15s]"></div>
                    <div class="w-1.5 h-1.5 bg-gray-500 rounded-full animate-bounce"></div>
                </div>
            `;
            msgDiv.appendChild(container);
            scrollToBottom('smooth');
            return id;
        }

        function hideLoading(id) { document.getElementById(id)?.remove(); }

        function scrollToBottom(behavior) {
            msgDiv.scrollTo({ top: msgDiv.scrollHeight, behavior });
        }

        btn.onclick = send;
        input.onkeypress = (e) => e.key === 'Enter' && send();
    </script>
</body>
</html>
