<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Катя ИИ</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        geminiBg: '#131314',
                        geminiInput: '#1e1f20',
                        geminiBotMsg: '#1e1f20',
                        geminiUserMsg: '#282a2c',
                        geminiAccent: '#8ab4f8'
                    }
                }
            }
        }
    </script>
</head>
<body>

<div class="app-container">
    <header class="flex items-center justify-between px-4 py-3 border-b border-gray-800 bg-geminiBg backdrop-blur-md shrink-0 pt-[env(safe-area-inset-top)]">
        <div class="flex items-center gap-2">
            <span class="material-icons-outlined text-gray-400">menu</span>
            <h1 class="text-xl font-medium text-white">Катя</h1>
        </div>
        <div class="flex items-center gap-4">
            <span class="material-icons-outlined text-gray-400 cursor-pointer" onclick="location.reload()">refresh</span>
            <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center font-bold text-sm text-white shadow-lg">P</div>
        </div>
    </header>

    <main id="chat-messages">
        <div id="initial-loader" class="flex justify-center items-center h-full">
            <div class="w-6 h-6 border-2 border-geminiAccent border-t-transparent rounded-full animate-spin"></div>
        </div>
    </main>

    <footer>
        <div class="max-w-4xl mx-auto px-3">
            <div class="flex items-center gap-2 bg-geminiInput border border-gray-700 rounded-full px-3 py-1 shadow-2xl min-h-[48px]">
                <button class="text-gray-400 hover:text-white transition-colors">
                    <span class="material-icons-outlined">add</span>
                </button>
                <input id="userInput" type="text" placeholder="Введите запрос..." 
                       class="flex-1 bg-transparent text-[16px] text-white py-2 focus:outline-none">
                <button id="sendBtn" class="text-geminiAccent disabled:text-gray-600 transition-all" disabled>
                    <span class="material-icons-outlined">send</span>
                </button>
            </div>
        </div>
    </footer>
</div>

<script src="/script.js"></script>
</body>
</html>
