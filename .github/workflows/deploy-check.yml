name: Vercel Deploy Notify
on: [push]

jobs:
  check-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel Build
        run: |
          # ВПИСЫВАЕМ ID ПРОЕКТА ПРЯМО СЮДА (Раз секреты не сохраняются)
          PRJ_ID="prj_46pAZRoz2mKFCZIyh2RN8QnWgZmn"
          
          echo "Мониторинг проекта: $PRJ_ID"
          sleep 30
          
          for i in {1..15}; do
            # Запрос (Токен берем из секретов, его ВАЖНО туда сохранить)
            RESPONSE=$(curl -s -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" "https://api.vercel.com/v13/deployments?projectId=$PRJ_ID&limit=1")
            
            # Если токен пустой, API выдаст ошибку, проверим это:
            if echo "$RESPONSE" | grep -q "error"; then
              echo "ОШИБКА API: $(echo $RESPONSE | jq -r '.error.message')"
              exit 1
            fi

            STATUS=$(echo $RESPONSE | jq -r '.deployments[0].state // "NOT_FOUND"')
            
            echo "Попытка $i: Статус -> $STATUS"
            
            if [ "$STATUS" == "READY" ]; then
              echo "Готово!"
              curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
                -d "chat_id=6828357999&text=✅ **BalastDB: Деплой завершен!**"
              exit 0
            fi
            
            sleep 20
          done
          exit 1
